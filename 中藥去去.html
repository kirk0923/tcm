    // ==========================================
    // 🚨 步驟二：系統會自動讀取上方的資料，這以下的程式碼都不要動喔！
    // ==========================================
    
    const allPapers = [
        { name: "第一組：Herbal Case Studies I", data: paper1 },
        { name: "第二組：Herbal Case Studies II", data: paper2 },
        { name: "第三組：Herbal Case Studies III", data: paper3 },
        { name: "第四組：Herbal Case Studies IV", data: paper4 },
        { name: "第五組：Herbal Case Studies V", data: paper5 },
        { name: "第六組：Herbal Case Studies VI", data: paper6 }

    ];

    let currentPaperIndex = 0;
    let currentQuestionIndex = 0;
    let isMistakeMode = false;
    let currentPool = [];
    let mistakes = JSON.parse(localStorage.getItem('tcmp_mistakes_v2')) || [];

    function initApp() {
        const select = document.getElementById('paper-select');
        allPapers.forEach((paper, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.text = paper.name;
            select.appendChild(option);
        });
        changePaper();
    }

    // 當選擇「哪一份考卷」時觸發，並自動生成 20 題一跳的選單
    function changePaper() {
        if (isMistakeMode) return; 
        currentPaperIndex = parseInt(document.getElementById('paper-select').value);
        
        const rangeSelect = document.getElementById('range-select');
        rangeSelect.innerHTML = ''; 
        
        const totalQ = allPapers[currentPaperIndex].data.length;
        if (totalQ === 0) return; 

        const chunkSize = 20;
        const chunks = Math.ceil(totalQ / chunkSize);
        
        for (let i = 0; i < chunks; i++) {
            const start = i * chunkSize + 1;
            const end = Math.min((i + 1) * chunkSize, totalQ);
            const option = document.createElement('option');
            option.value = i;
            option.text = `第 ${start} - ${end} 題`;
            rangeSelect.appendChild(option);
        }
        
        rangeSelect.style.display = 'inline-block';
        changeRange(); // 自動載入第一個範圍
    }

    // 當選擇「哪一個範圍」時觸發，把題目切換過去
    function changeRange() {
        if (isMistakeMode) return;
        currentPaperIndex = parseInt(document.getElementById('paper-select').value);
        const rangeIndex = parseInt(document.getElementById('range-select').value);
        const chunkSize = 20;
        
        const fullData = allPapers[currentPaperIndex].data;
        // 切割出 20 題
        const slicedData = fullData.slice(rangeIndex * chunkSize, (rangeIndex + 1) * chunkSize);
        
        currentPool = slicedData.map(q => ({
            ...q, 
            globalId: `${currentPaperIndex}_${q.id}`,
            sourceName: allPapers[currentPaperIndex].name
        }));
        
        currentQuestionIndex = 0;
        showQuizArea();
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= currentPool.length) {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('finish-message').style.display = 'block';
            return;
        }

        const currentQ = currentPool[currentQuestionIndex];
        if (!currentQ || !currentQ.question) {
            nextQuestion();
            return;
        }

        document.getElementById('progress-text').innerText = `目前進度: ${currentQuestionIndex + 1} / ${currentPool.length}`;
        
        if (isMistakeMode) {
            document.getElementById('source-tag-container').innerHTML = `<span class="source-tag">出自：${currentQ.sourceName} (原第${currentQ.id}題)</span>`;
        } else {
            document.getElementById('source-tag-container').innerHTML = '';
        }

        document.getElementById('question-text').innerText = currentQ.question;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        if (currentQ.options) {
            for (const [key, value] of Object.entries(currentQ.options)) {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${key}. ${value}`;
                btn.onclick = () => checkAnswer(key, btn, currentQ);
                optionsContainer.appendChild(btn);
            }
        }

        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(selectedKey, clickedBtn, currentQ) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        if (selectedKey === currentQ.answer) {
            clickedBtn.classList.add('correct');
            if (mistakes.includes(currentQ.globalId)) {
                mistakes = mistakes.filter(id => id !== currentQ.globalId);
                localStorage.setItem('tcmp_mistakes_v2', JSON.stringify(mistakes));
            }
        } else {
            clickedBtn.classList.add('wrong');
            buttons.forEach(btn => { if (btn.innerText.startsWith(currentQ.answer)) btn.classList.add('correct'); });
            
            if (!mistakes.includes(currentQ.globalId)) {
                mistakes.push(currentQ.globalId);
                localStorage.setItem('tcmp_mistakes_v2', JSON.stringify(mistakes));
            }
        }

        const expBox = document.getElementById('explanation-box');
        expBox.innerHTML = `<strong>正確答案：${currentQ.answer}</strong><br><br>${currentQ.explanation || '本題無詳解'}`;
        expBox.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        loadQuestion();
    }

    function showQuizArea() {
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('finish-message').style.display = 'none';
    }

    function toggleMistakeMode() {
        const btn = document.getElementById('mode-btn');
        const selectPaper = document.getElementById('paper-select');
        const selectRange = document.getElementById('range-select');
        isMistakeMode = !isMistakeMode;

        if (isMistakeMode) {
            currentPool = [];
            allPapers.forEach((paper, pIndex) => {
                paper.data.forEach(q => {
                    const globalId = `${pIndex}_${q.id}`;
                    if (mistakes.includes(globalId)) {
                        currentPool.push({ ...q, globalId: globalId, sourceName: paper.name });
                    }
                });
            });

            if (currentPool.length === 0) {
                alert("目前跨卷總錯題本是空的！基礎很紮實喔！");
                isMistakeMode = false;
                return;
            }
            selectPaper.disabled = true;
            selectRange.style.display = 'none'; 
            btn.innerText = "返回正常刷題";
            btn.classList.add('active');
        } else {
            selectPaper.disabled = false;
            selectRange.style.display = 'inline-block';
            btn.innerText = "跨卷錯題本";
            btn.classList.remove('active');
            changePaper(); 
            return; 
        }
        
        currentQuestionIndex = 0;
        showQuizArea();
        loadQuestion();
    }

    window.onload = initApp;
</script>
